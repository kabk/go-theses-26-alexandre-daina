<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Lancelot&display=swap" rel="stylesheet">
<link rel="icon" href="assets/images/favicon/EUM.png" />
    <style>
        .lancelot-regular {
font-family: "Lancelot", serif;
font-weight: bold;
font-style: normal;
font-size: 60px;
}

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', Times, serif;
           /* background-image: url(content/piano.jpg);
           background-repeat: no-repeat;
           background-size: 200vh;*/
        }
    
        h1 {
            margin-bottom: 40px;
            font-size: 50px;
            text-align: left;
        }
        
        #button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: -100px;
            /* justify-content: top; */
        }

        a.button {
            text-decoration: none;
            padding: 15px 40px;
            color: rgb(0, 0, 0);
            text-align: center;
            font-size: 30px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .shelf {
            display: flex;
            width: 100%;
        }
        .end { max-width: 30vw;

        }
        /* Columns */
        .column {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            max-width: 30vw;
        }

        a.button:hover {
            color: #870000c2;
        }

        .title{
            width: 80vw;
            top : 0;
            left: 20px;
        }

        .foot{
            position: absolute;
            text-align: center;
            width: 90vw;
            bottom : 1vh;
        }
        .container{
            position: absolute;
            display: flex;
    flex-direction: column; /* stack vertically */
    width: 100%;
    gap: 20px;
    padding-left: 10vw;
    top:0;
        }

        @media (max-width: 768px) {
      #endd{
        width: 0vw; /* Much wider on mobile for readability */
      }
      .end{
        width: 0vw; /* Keeps the title correctly proportioned on small screens too */
      }
      .lancelot-regular {
        font-size: 40px; 
      }
    } 
    </style>
</head>
<body>
    
  <div class="container">
    <div class="title">
        <h1 class="lancelot-regular">The Echo of an Unshared Mind: <br> From Hyper-Awareness to Perceptual Collapse</h1>
    </div>
    <div class="shelf">
        <div class="column" id="endd">
        <img src="content/lefts.png" alt="Image 1" class="end">
    </div>

    <div id="button-container" class="column">
        
        <a href="abstract.html" class="button">ABSTRACT</a>
        <a href="chapter1.html" class="button">Ⅰ</a>
        <a href="chapter2.html" class="button">ⅠⅠ</a>
        <a href="chapter3.html" class="button">ⅠⅠⅠ</a>
    </div>

    <div class="column" id="endd">
        <img class="end" src="content/rights.png" alt="Image 1">
    </div>

    </div>
  </div>
  <div class="foot">
    Document by <b>Alexandre Daina</b>
</div>
</body>
</html>
